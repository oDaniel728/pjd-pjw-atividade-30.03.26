<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/assets/animations.css">
    <link rel="stylesheet" href="./style.css">
    
    <!-- Roboto Mono - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

</head>
<body>
    
    <header>
        <div class="px-4">
            <h3><i class="bi bi-heart-fill"></i> Jogo da Forca</h3>
        </div>
        <a class="btn btn-light" href="/dashboard.html">
            <i class="bi bi-box-arrow-left"></i> Voltar
        </a>
    </header>
    <main>
        <div>
            <div class="scoreholder">
                <div>
                    <p id="time">00:00</p>
                </div>
                <div class="middle">
                    <p class="me-3">Pontuação: <span id="score">35</span></p>
                </div>
                <div>
                    <p class="lives">
                        <i class="bi bi-heart-fill"></i>
                        <i class="bi bi-heart"></i>
                        <i class="bi bi-heart"></i>
                        <i class="bi bi-heart"></i>
                        <i class="bi bi-heart"></i>
                    </p>
                </div>
            </div>
            <div class="prohibited_letters">
                <span>A</span>
                <span>B</span>
                <span>C</span>
                <span>D</span>
                <span>E</span>
            </div>
            <div class="game">
                <div class="letters">
                    <span class="letter" letter="A"><i class="bi bi-asterisk"></i></span>
                    <span class="letter" letter="A"><i class="bi bi-asterisk"></i></span>
                    <span class="letter" letter="A"><i class="bi bi-asterisk"></i></span>
                    <span class="letter" letter="A"><i class="bi bi-asterisk"></i></span>
                    <span class="letter" letter="A"><i class="bi bi-asterisk"></i></span>
                    <span class="letter" letter="A"><i class="bi bi-asterisk"></i></span>
                    <span class="letter" letter="A"><i class="bi bi-asterisk"></i></span>
                </div>
                <input type="text" class="text">
            </div>
        </div>
    </main>

    <footer>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="./script.js" type="module"></script>
</body>
</html>

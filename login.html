<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jogo WEB IFAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        :root {
            --ifam-green: #008037;
            --ifam-yellow: #FFC72C;
        }
        .bg-ifam { background-color: var(--ifam-green) !important; }
        .btn-primary {
            background-color: var(--ifam-green);
            border-color: var(--ifam-green);
        }
        .btn-primary:hover {
            background-color: #006b2d;
            border-color: #006b2d;
        }
        .text-ifam { color: var(--ifam-green) !important; }
        .border-ifam { border-color: var(--ifam-green) !important; } 
        .link-cadastro {
            color: green !important;
        } 
        .modal-header {
            background-color: var(--primary-color) !important;
        }
        .modal-body { 
            background-color: var(--primary-dark) !important;
        }
        input, input::placeholder { 
            background-color: var(--primary-dark) !important;
            color: white !important;
            border-color: green !important;
        } 
        input::placeholder { 
            color: gray !important;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card fade-in">
            <div class="login-header">
                <div class="icon">
                    <i class="fas fa-gamepad"></i>
                </div>
                <h2 class="mb-1">Bem-vindo!</h2>
                <p class="mb-0 opacity-75">Entre para jogar e se divertir</p>
            </div>
            
            <div class="login-body">
                <!-- Formulário de Login -->
                <form id="formLogin">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email
                        </label>
                        <input type="email" class="form-control" id="email" 
                               placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="senha" class="form-label">
                            <i class="fas fa-lock me-2"></i>Senha
                        </label>
                        <input type="password" class="form-control" id="senha" 
                               placeholder="••••••••" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="lembrar">
                        <label class="form-check-label" for="lembrar">
                            Lembrar-me
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-login btn-primary w-100 py-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Entrar
                    </button>
                </form>
                
                <div class="divider">
                    <span>ou</span>
                </div>
                
                <p class="text-center">
                    Não tem conta? 
                    <a href="#" class="link-cadastro" data-bs-toggle="modal" 
                       data-bs-target="#modalCadastro">
                        Cadastre-se agora
                    </a>
                </p>
                
                <!-- Mensagem de feedback -->
                <div id="mensagemLogin" class="alert d-none" role="alert"></div>
            </div>
        </div>
    </div>

    <!-- Modal de Cadastro -->
    <div class="modal fade" id="modalCadastro" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="fas fa-user-plus me-2"></i>Criar Conta
                    </h5>
                    <button type="button" class="btn-close btn-close-white" 
                            data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formCadastro">
                        <div class="mb-3">
                            <label for="nomeCadastro" class="form-label">
                                <i class="fas fa-user me-2"></i>Nome Completo
                            </label>
                            <input type="text" class="form-control" id="nomeCadastro" 
                                   placeholder="Seu nome" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="emailCadastro" class="form-label">
                                <i class="fas fa-envelope me-2"></i>Email
                            </label>
                            <input type="email" class="form-control" id="emailCadastro" 
                                   placeholder="seu@email.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="senhaCadastro" class="form-label">
                                <i class="fas fa-lock me-2"></i>Senha
                            </label>
                            <input type="password" class="form-control" id="senhaCadastro" 
                                   placeholder="Mínimo 6 caracteres" minlength="6" required>
                            <div class="form-text">A senha deve ter pelo menos 6 caracteres</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirmarSenha" class="form-label">
                                <i class="fas fa-lock me-2"></i>Confirmar Senha
                            </label>
                            <input type="password" class="form-control" id="confirmarSenha" 
                                   placeholder="Repita a senha" required>
                        </div>
                        
                        <div id="mensagemCadastro" class="alert d-none" role="alert"></div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-3">
                            <i class="fas fa-user-plus me-2"></i>Cadastrar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="spinner-container d-none">
        <div class="spinner"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ============================================
        // CONFIGURAÇÃO DO FIREBASE - SUBSTITUA OS VALORES
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCBZGph8g79sGTWu5CVynTpeXaUOar-wn8",
            authDomain: "jogos-web-ifam-login-ac5da.firebaseapp.com",
            databaseURL: "https://jogos-web-ifam-login-ac5da-default-rtdb.firebaseio.com",
            projectId: "jogos-web-ifam-login-ac5da",
            storageBucket: "jogos-web-ifam-login-ac5da.firebasestorage.app",
            messagingSenderId: "267249166179",
            appId: "1:267249166179:web:7b06913ce99b86b4489556",
            measurementId: "G-F0LSKZE1W2"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ============================================
        // FUNÇÕES DE AUTENTICAÇÃO
        // ============================================

        // Mostrar/esconder loading
        function toggleLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.remove('d-none');
            } else {
                loading.classList.add('d-none');
            }
        }

        // Mostrar mensagem
        function mostrarMensagem(elementId, tipo, texto) {
            const element = document.getElementById(elementId);
            element.className = `alert alert-${tipo}`;
            element.textContent = texto;
            element.classList.remove('d-none');
            
            // Auto-hide após 5 segundos
            setTimeout(() => {
                element.classList.add('d-none');
            }, 5000);
        }

        // Login de usuário
        async function loginUsuario(email, senha) {
            toggleLoading(true);
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, senha);
                console.log("Login realizado:", userCredential.user.email);
                
                mostrarMensagem('mensagemLogin', 'success', 'Login realizado com sucesso! Redirecionando...');
                
                // Redirecionar após login
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                console.error("Erro no login:", error);
                
                let mensagem = "Erro ao fazer login";
                const erro = error.code;
                
                if (erro === "auth/invalid-email") {
                    mensagem = "Email inválido";
                } else if (erro === "auth/invalid-credential") {
                    mensagem = "Email ou senha incorretos";
                } else if (erro === "auth/user-not-found") {
                    mensagem = "Usuário não encontrado";
                } else if (erro === "auth/wrong-password") {
                    mensagem = "Senha incorreta";
                } else if (erro === "auth/too-many-requests") {
                    mensagem = "Muitas tentativas. Tente novamente mais tarde";
                }
                
                mostrarMensagem('mensagemLogin', 'danger', mensagem);
            } finally {
                toggleLoading(false);
            }
        }

        // Cadastro de usuário
        async function cadastrarUsuario(email, senha, nome) {
            toggleLoading(true);
            
            try {
                // Criar usuário no Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                const user = userCredential.user;
                
                console.log("Usuário criado:", user.email);
                
                // Salvar dados adicionais no Realtime Database
                await set(ref(db, 'usuarios/' + user.uid), {
                    nome: nome,
                    email: email,
                    pontuacao: 0,
                    pontuacao_maxima: 0,
                    rounds: 0,
                    nivel: 1,
                    dataCadastro: new Date().toISOString(),
                    avatar: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(nome) + '&background=667eea&color=fff'
                });
                
                // Também adicionar ao ranking
                await set(ref(db, 'ranking/' + user.uid), {
                    nome: nome,
                    pontuacao: 0
                });
                
                mostrarMensagem('mensagemCadastro', 'success', 'Cadastro realizado com sucesso!');
                
                // Fechar modal e limpar formulário
                setTimeout(() => {
                    const modal = bootstrap.Modal.getInstance(document.getElementById('modalCadastro'));
                    modal.hide();
                    document.getElementById('formCadastro').reset();
                    document.getElementById('mensagemCadastro').classList.add('d-none');
                }, 1500);
                
            } catch (error) {
                console.error("Erro no cadastro:", error);
                
                let mensagem = "Erro ao fazer cadastro";
                const erro = error.code;
                
                if (erro === "auth/email-already-in-use") {
                    mensagem = "Este email já está cadastrado";
                } else if (erro === "auth/weak-password") {
                    mensagem = "Senha muito fraca (mínimo 6 caracteres)";
                } else if (erro === "auth/invalid-email") {
                    mensagem = "Email inválido";
                }
                
                mostrarMensagem('mensagemCadastro', 'danger', mensagem);
            } finally {
                toggleLoading(false);
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        // Formulário de Login
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            await loginUsuario(email, senha);
        });

        // Formulário de Cadastro
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nomeCadastro').value;
            const email = document.getElementById('emailCadastro').value;
            const senha = document.getElementById('senhaCadastro').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            
            // Validar senhas iguais
            if (senha !== confirmarSenha) {
                mostrarMensagem('mensagemCadastro', 'danger', 'As senhas não conferem!');
                return;
            }
            
            // Validar tamanho da senha
            if (senha.length < 6) {
                mostrarMensagem('mensagemCadastro', 'danger', 'A senha deve ter pelo menos 6 caracteres!');
                return;
            }
            
            await cadastrarUsuario(email, senha, nome);
        });

        // Verificar se usuário já está logado
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuário já está logado, redirecionar para dashboard
                console.log("Usuário já logado:", user.email);
                // window.location.href = 'dashboard.html';
            }
        });

        // Limpar mensagens ao fechar modal
        document.getElementById('modalCadastro').addEventListener('hidden.bs.modal', () => {
            document.getElementById('mensagemCadastro').classList.add('d-none');
            document.getElementById('formCadastro').reset();
        });
    </script>
</body>
</html>

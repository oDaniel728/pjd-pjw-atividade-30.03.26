<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo WEB - IFAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --ifam-green: #008037;
            --ifam-yellow: #FFC72C;
        }
        .bg-ifam { background-color: var(--ifam-green) !important; }
        .btn-primary {
            background-color: var(--ifam-green);
            border-color: var(--ifam-green);
        }
        .btn-primary:hover {
            background-color: #006b2d;
            border-color: #006b2d;
        }
    </style>
    <link href="css/style.css" rel="stylesheet">
    <style>
        .hero-section {
            min-height: 100vh;
            background: linear-gradient(135deg, #008037 0%, #006b2d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-content {
            text-align: center;
            color: white;
            padding: 20px;
        }
        .hero-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        .btn-hero {
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-hero:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Section Hero -->
    <section class="hero-section">
        <div class="hero-content fade-in">
            <div class="hero-icon">
                <i class="fas fa-gamepad"></i>
            </div>
            
            <h1 class="display-2 fw-bold mb-3">Jogo WEB</h1>
            <p class="lead mb-4">Instituto Federal de Educação, Ciência e Tecnologia do Amazonas</p>
            <p class="h5 mb-5">Campus Manacapuru</p>
            
            <div>
                <a href="login.html" class="btn btn-light btn-hero me-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Entrar
                </a>
            </div>
            
            <div class="mt-5">
                <p class="small opacity-75">Desenvolvido na disciplina de Desenvolvimento de Jogos para WEB</p>
                <div class="d-flex justify-content-center gap-3">
                    <span class="badge bg-light "><i class="fab fa-html5 me-1"></i> HTML</span>
                    <span class="badge bg-light "><i class="fab fa-css3-alt me-1"></i> CSS</span>
                    <span class="badge bg-light "><i class="fab fa-bootstrap me-1"></i> Bootstrap</span>
                    <span class="badge bg-light "><i class="fab fa-js me-1"></i> JavaScript</span>
                    <span class="badge bg-light "><i class="fas fa-fire me-1"></i> Firebase</span>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Verificar se está logado e redirecionar -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBZGph8g79sGTWu5CVynTpeXaUOar-wn8",
            authDomain: "jogos-web-ifam-login-ac5da.firebaseapp.com",
            databaseURL: "https://jogos-web-ifam-login-ac5da-default-rtdb.firebaseio.com",
            projectId: "jogos-web-ifam-login-ac5da",
            storageBucket: "jogos-web-ifam-login-ac5da.firebasestorage.app",
            messagingSenderId: "267249166179",
            appId: "1:267249166179:web:7b06913ce99b86b4489556",
            measurementId: "G-F0LSKZE1W2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Está logado, ir para dashboard
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
